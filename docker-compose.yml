version: "3.8"
services:
  backend-flask:
    environment:
      FRONTEND_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:4567"
      PORT: 4567
      FLASK_DEBUG: 1
    build: ./backend-flask
    ports:
      - "4567:4567"
    volumes:
      - ./backend-flask:/backend-flask
    command: python -m flask run --host=0.0.0.0 --port=4567 --debug

  backend-go:
    environment:
      FRONTEND_URL: "http://localhost:3000"
      BACKEND_URL: "http://localhost:8080"
      PORT: 8080
    build: 
      context: ./backend-go
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend-go:/backend-go
    command: air

  frontend-react-js:
    environment:
      REACT_APP_BACKEND_URL: "http://localhost:8080"
    build: ./frontend-react-js
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react-js:/frontend-react-js
      - /frontend-react-js/node_modules

networks:
  internal-network:
    driver: bridge
    name: buzzer