services:
  backend-go:
    environment:
      APP_ENV: "${APP_ENV:-local}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      BACKEND_URL: "${BACKEND_URL:-http://localhost:8080}"
      PORT: "${PORT:-8080}"

      # Variáveis do Honeycomb / OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-https://api.honeycomb.io}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS}" # Chave sensível (melhor vir estrito do ambiente/.env)
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-backend-go}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      ROLLBAR_TOKEN: "${ROLLBAR_TOKEN}"
      ROLLBAR_ENVIRONMENT: "${ROLLBAR_ENV:-local}"
      AWS_USER_POOLS_ID: "${AWS_USER_POOLS_ID}"

    build:
      context: ./backend-go
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend-go:/backend-go
    command: air
    networks:
      - internal-network

  frontend-react-js:
    environment:
      REACT_APP_BACKEND_URL: "${BACKEND_URL:-http://localhost:8080}"
      REACT_APP_AWS_PROJECT_REGION: "${AWS_DEFAULT_REGION}"
      REACT_APP_AWS_COGNITO_REGION: "${AWS_DEFAULT_REGION}"
      REACT_APP_AWS_USER_POOLS_ID: "${REACT_APP_AWS_USER_POOLS_ID}"
      REACT_APP_CLIENT_ID: "${REACT_APP_CLIENT_ID}"
    build: ./frontend-react-js
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react-js:/frontend-react-js
      - /frontend-react-js/node_modules
    networks:
      - internal-network
# the name flag is a hack to change the default prepend folder
# name when outputting the image names
networks:
  internal-network:
    driver: bridge
    name: buzzer

volumes:
  db:
    driver: local
# ... resto dos serviços (dynamodb, db, networks, volumes) continuam iguais
